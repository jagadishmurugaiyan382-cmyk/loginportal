<!DOCTYPE html>
<html>
<body>

<h2>All Users</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Username</th>
<th>Password</th>
<th>Action</th>
</tr>

{% for u in users %}

<tr>
<td>{{u[0]}}</td>
<td>{{u[1]}}</td>
<td>{{u[2]}}</td>

<td>
<a href="/edit/{{u[0]}}">Edit</a>
|
<a href="/delete/{{u[0]}}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

<a href="/dashboard">Back</a>

</body>
</html>
